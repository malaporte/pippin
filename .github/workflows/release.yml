name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-darwin:
    name: Build darwin binaries
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build darwin binaries
        run: bun run scripts/build.ts --cli --darwin

      - name: Sign darwin binaries
        run: |
          codesign --sign - --force dist/pippin-darwin-arm64
          codesign --sign - --force dist/pippin-darwin-x64

      - name: Smoke test
        run: dist/pippin-darwin-arm64 --version

      - name: Upload darwin binaries
        uses: actions/upload-artifact@v4
        with:
          name: darwin-binaries
          path: |
            dist/pippin-darwin-arm64
            dist/pippin-darwin-x64
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download darwin binaries
        uses: actions/download-artifact@v4
        with:
          name: darwin-binaries
          path: dist/

      - name: Mark darwin binaries executable
        run: chmod +x dist/pippin-darwin-arm64 dist/pippin-darwin-x64

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release
